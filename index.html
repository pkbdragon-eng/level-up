<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness RPG Premium</title>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
margin:0 0 10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:5px;
}

button{
background:#4f46e5;
color:white;
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
width:100%;
}

button:hover{
background:#4338ca;
}

.progress{
background:#eee;
height:12px;
border-radius:20px;
overflow:hidden;
}

.bar{
background:#4f46e5;
height:100%;
width:0%;
}

.avatar{
font-size:60px;
}

.stat{
background:#f8fafc;
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Fitness RPG</h1>

<div id="levelInfo"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<div class="grid">

<div class="card">

<h2>Personagem</h2>

<div class="avatar" id="avatar">🧑‍🎽</div>

<input id="nome" placeholder="Nome">
<input id="idade" placeholder="Idade">
<input id="altura" placeholder="Altura">
<input id="peso" placeholder="Peso">
<input id="objetivo" placeholder="Objetivo">

</div>

<div class="card">

<h2>Atributos</h2>

<div class="stat">STR <span id="str"></span></div>
<div class="stat">AGI <span id="agi"></span></div>
<div class="stat">END <span id="end"></span></div>
<div class="stat">INT <span id="int"></span></div>
<div class="stat">DISC <span id="disc"></span></div>
<div class="stat">TEC <span id="tec"></span></div>

</div>

</div>

<div class="grid">

<div class="card">

<h2>Registrar Treino</h2>

<input id="treinoNome" placeholder="Treino">
<input id="series" placeholder="Séries">
<input id="reps" placeholder="Repetições">
<input id="carga" placeholder="Carga">

<textarea id="obs" placeholder="Observação"></textarea>

<button onclick="registrarTreino()">Registrar treino</button>

</div>

<div class="card">

<h2>Registrar Leitura</h2>

<input id="livro" placeholder="Livro">
<input id="paginas" placeholder="Páginas">
<input id="tempo" placeholder="Tempo">

<textarea id="resumo" placeholder="Resumo"></textarea>

<button onclick="registrarLeitura()">Registrar leitura</button>

</div>

</div>

<div class="card">

<h2>Histórico</h2>

<div id="historico"></div>

</div>

</div>

<script>

const STORAGE="fitness-rpg";

let state={
nome:"Pablo",
xp:0,
dailyXp:0,
stats:{str:0,agi:0,end:0,int:0,disc:0,tec:0},
history:[]
}

function xpForLevel(level){
return Math.floor(95*Math.pow(level,1.26))
}

function totalXp(level){
let total=0
for(let i=1;i<level;i++){
total+=xpForLevel(i)
}
return total
}

function levelFromXp(xp){
let level=1
while(xp>=totalXp(level+1)){
level++
}
return level
}

function salvar(){
localStorage.setItem(STORAGE,JSON.stringify(state))
}

function carregar(){

let save=localStorage.getItem(STORAGE)

if(save){
state=JSON.parse(save)
}

}

function registrarTreino(){

let nome=document.getElementById("treinoNome").value

let xp=30

state.xp+=xp

state.stats.str+=2
state.stats.agi+=1
state.stats.disc+=1

state.history.unshift("Treino: "+nome+" +"+xp+"XP")

salvar()

render()

}

function registrarLeitura(){

let livro=document.getElementById("livro").value

let xp=20

state.xp+=xp

state.stats.int+=3
state.stats.disc+=1

state.history.unshift("Leitura: "+livro+" +"+xp+"XP")

salvar()

render()

}

function render(){

let level=levelFromXp(state.xp)

let current=totalXp(level)
let next=totalXp(level+1)

let progress=(state.xp-current)/(next-current)*100

document.getElementById("levelInfo").innerHTML="Level "+level+" | "+state.xp+" XP"

document.getElementById("bar").style.width=progress+"%"

document.getElementById("str").innerText=state.stats.str
document.getElementById("agi").innerText=state.stats.agi
document.getElementById("end").innerText=state.stats.end
document.getElementById("int").innerText=state.stats.int
document.getElementById("disc").innerText=state.stats.disc
document.getElementById("tec").innerText=state.stats.tec

let h=""

state.history.slice(0,10).forEach(i=>{
h+="<div>"+i+"</div>"
})

document.getElementById("historico").innerHTML=h

}

carregar()

render()

</script>

</body>
</html>
